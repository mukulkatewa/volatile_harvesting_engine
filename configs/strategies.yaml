grid:
  atr_multiplier: 0.45
  max_levels: 3
  no_buy_above_fair_value_pct: 0.012
  min_spacing: 0.75
  min_spacing_pct: 0.004
  fill_tolerance_pct: 0.0
  seed_deploy_pct: 0.20
  level_capital_multiplier: 1.0
  # Round-trip cost (~0.11% Zerodha intraday) + spread (~0.1%) + edge buffer.
  # Entry must be this far below fair value and exit must clear this above cost.
  min_harvest_pct: 0.0035
  # Floor so each fill is meaningful and fixed costs are amortised, not 1-share churn.
  min_order_notional: 4000.0

momentum:
  risk_per_trade_inr: 187.5
  max_capital_per_trade_inr: 11250.0

pair:
  symbol_a: RELIANCE
  symbol_b: HDFCBANK
  hedge_ratio: 1.0
  # log(RELIANCE) - log(HDFCBANK); calibrated from 6mo NSE daily closes (yfinance)
  mean: 0.5001
  std: 0.0656
  entry_z: 1.5
  exit_z: 0.25
  max_abs_z: 3.0

capital:
  grid_bucket_pct: 0.70
  pair_bucket_pct: 0.10
  momentum_bucket_pct: 0.10
  reserve_bucket_pct: 0.10

regime:
  range_adx_threshold: 20.0
  trend_adx_threshold: 25.0
  fair_value_band_pct: 0.03
  # Intraday circuit breaker only (genuine collapse). Routine 1-3% dips stay RANGE
  # so the grid can buy and harvest them instead of panic-selling at a loss.
  crash_drawdown_pct: -6.0

feed:
  symbols:
    # Large-cap NSE liquid names for paper grid testing (yfinance .NS)
    - RELIANCE
    - HDFCBANK
    - ICICIBANK
    - INFY
    - TCS
    - SBIN
    - BHARTIARTL
    - ITC
    - LT
    - KOTAKBANK
    - BEL
    - TMPV
    - WIPRO
    - HCLTECH
    - AXISBANK
    - MARUTI
    - SUNPHARMA
  interval_seconds: 30.0
  source: yfinance
  bar_interval_minutes: 5
  fallback_to_simulated: true
