# Free tier: yfinance delayed data + conservative paper fills for realistic validation.
# Use Kite Personal API token only when you switch to live orders (no live quotes on free plan).
mode: paper
capital_cap_inr: 75000
max_symbols: 5
max_grid_levels: 5
force_exit_time: "15:10"
config_dir: configs

broker:
  provider: zerodha
  websocket_enabled: false
  api_key_env: KITE_API_KEY
  access_token_env: KITE_ACCESS_TOKEN
  api_secret_env: KITE_API_SECRET
  instrument_cache_dir: data/raw/kite
  subscription_mode: quote
  reconnect_seconds: 5.0

paper:
  aggressive_fills: false
  limit_tolerance_bps: 10
  fill_full_quantity: false

risk:
  reserve_capital_pct: 0.10
  max_daily_loss_pct: 0.03
  max_gross_exposure_pct: 0.85
  max_single_symbol_qty: 500
  max_symbol_deploy_pct: 0.35
  max_symbol_exposure_pct: 0.25
  max_grid_fills_per_symbol: 12
  kill_switch_on_stale_quotes: true
  max_quote_stale_ms: 180000

storage:
  sqlite_path: data/vhe_platform.db
  persist_events: true
  persist_fills: true
