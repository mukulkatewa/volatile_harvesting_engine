<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VHE Control</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar reveal">
        <div>
          <p class="eyebrow">Volatility Harvesting Engine</p>
          <h1>Strategy Control</h1>
        </div>
        <div class="actions">
          <button class="icon-button" title="Pause automation" aria-label="Pause automation">II</button>
          <button class="icon-button danger" title="Kill switch" aria-label="Kill switch">!</button>
          <div class="status"><span id="connection-dot" class="dot"></span><span id="connection-label">Connecting</span></div>
        </div>
      </section>

      <section class="metrics reveal delay-1">
        <article><span>Equity</span><strong id="equity">-</strong></article>
        <article><span>Cash</span><strong id="cash">-</strong></article>
        <article><span>Unrealized</span><strong id="unrealized-pnl">-</strong></article>
        <article><span>Mode</span><strong id="mode-label">Paper</strong></article>
      </section>

      <section class="ticker reveal delay-2" id="ticker"></section>

      <section class="workspace reveal delay-3">
        <div class="panel quotes-panel">
          <div class="panel-head"><h2>Market Feed</h2><span>Top of book</span></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Symbol</th><th>LTP</th><th>Spread</th><th>Age</th><th>Volume</th></tr></thead>
              <tbody id="quotes-body"></tbody>
            </table>
          </div>
        </div>

        <div class="panel grid-panel">
          <div class="panel-head"><h2>Strategy Stack</h2><span>Grid + momentum</span></div>
          <div id="strategy-plans" class="grid-plans"></div>
        </div>

        <div class="panel orders-panel">
          <div class="panel-head"><h2>Execution Tape</h2><span>Paper fills</span></div>
          <div id="fills" class="orders empty-state"><span>No fills yet</span></div>
        </div>
      </section>

      <section class="positions reveal delay-3">
        <div class="panel">
          <div class="panel-head"><h2>Positions</h2><span>Marked to market</span></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Symbol</th><th>Qty</th><th>Avg</th><th>LTP</th><th>Unrealized</th></tr></thead>
              <tbody id="positions-body"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
