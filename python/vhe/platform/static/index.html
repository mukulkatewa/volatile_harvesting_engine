<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VHE Control</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Volatility Harvesting Engine</p>
          <h1>Live Strategy Console</h1>
        </div>
        <div class="status">
          <span id="connection-dot" class="dot"></span>
          <span id="connection-label">Connecting</span>
        </div>
      </section>

      <section class="metrics">
        <article><span>Feed</span><strong id="feed-source">-</strong></article>
        <article><span>Symbols</span><strong id="symbol-count">0</strong></article>
        <article><span>Pending Intents</span><strong id="order-count">0</strong></article>
        <article><span>Mode</span><strong>Paper</strong></article>
      </section>

      <section class="workspace">
        <div class="panel quotes-panel">
          <div class="panel-head"><h2>Quotes</h2><span>Simulated feed</span></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Symbol</th><th>LTP</th><th>Spread</th><th>Volume</th></tr></thead>
              <tbody id="quotes-body"></tbody>
            </table>
          </div>
        </div>

        <div class="panel grid-panel">
          <div class="panel-head"><h2>Dynamic Grid</h2><span>ATR spaced</span></div>
          <div id="grid-plans" class="grid-plans"></div>
        </div>

        <div class="panel orders-panel">
          <div class="panel-head"><h2>Strategy Intents</h2><span>Last 25</span></div>
          <div id="orders" class="orders"></div>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
